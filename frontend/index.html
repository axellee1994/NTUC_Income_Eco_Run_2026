<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income Eco Run – Results</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <!-- ── Landing screen ──────────────────────────────────────────────────── -->
  <div id="landing-screen">
    <div class="landing-card">
      <h1 class="landing-title">Income Eco Run</h1>
      <p class="landing-sub">Results Viewer</p>
      <p class="landing-prompt">Select a year to view results</p>
      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <button class="btn-year" data-year="2024">2024</button>
        <button class="btn-year" data-year="2025">2025</button>
        <button class="btn-year" data-year="2026">2026</button>
      </div>
    </div>
  </div>

  <!-- ── Main app (shown after year selection) ───────────────────────────── -->
  <div id="app" style="display:none">

    <nav class="navbar navbar-dark bg-dark sticky-top px-3 gap-3">
      <button id="back-btn" class="btn btn-back-year btn-sm" title="Change year">&#8592; Year</button>
      <img id="event-logo" alt="Event Logo">
      <span id="event-name" class="navbar-brand mb-0 me-auto">Loading event…</span>
      <select id="race-select" class="form-select form-select-sm select-accent" style="max-width:260px" disabled>
        <option value="">Loading races…</option>
      </select>
    </nav>

    <div class="info-bar d-flex align-items-center gap-3 px-3 py-2 bg-white border-bottom flex-wrap">
      <span class="stat-chip" id="chip-race">—</span>
      <span class="stat-chip" id="chip-total">—</span>
      <span class="stat-chip" id="chip-loaded">—</span>
      <button id="load-btn" class="btn btn-accent btn-sm ms-auto">&#9654; Load Results</button>
    </div>

    <div id="progress-wrap" class="px-3 py-2 bg-white border-bottom">
      <div class="progress" style="height:6px">
        <div class="progress-bar bg-accent" id="progress-fill" style="width:0%"></div>
      </div>
      <p id="progress-text" class="text-muted small mt-1 mb-0"></p>
    </div>

    <div class="px-3 pt-3">
      <input id="search-input" type="search" class="form-control" style="max-width:480px"
             placeholder="Search by name or bib…" disabled>
    </div>

    <p id="results-count" class="px-3 pt-1 text-muted small mb-0"></p>

    <div class="px-3 pb-5 mt-2 overflow-x-auto">
      <table class="table table-hover table-bordered align-middle results-table">
        <thead class="table-dark">
          <tr>
            <th class="sortable" data-col="position">Pos</th>
            <th class="sortable" data-col="bib">Bib</th>
            <th class="sortable" data-col="name">Name</th>
            <th class="sortable sort-asc" data-col="chipTimeSec">Chip Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" class="empty-state">Select a race to begin</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
